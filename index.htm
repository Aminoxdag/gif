<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Gifs Pro - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            color: #fff;
            user-select: none;
            overflow-x: hidden;
        }

        .gif-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        }

        .shimmer {
            background: linear-gradient(90deg, #0a0a0a 25%, #151515 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .loader-spin {
            border: 3px solid rgba(124, 58, 237, 0.1);
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 32px; height: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-50 bg-black/70 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M10 8v8l6-4-6-4z"/></svg>
            </div>
            <span class="text-xl font-black tracking-tight uppercase">INFINITY <span class="text-purple-500">PRO</span></span>
        </div>
        <button onclick="location.reload()" class="p-2 text-neutral-500 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        </button>
    </header>

    <div id="upload-screen" class="max-w-md mx-auto mt-20 px-8 text-center">
        <div class="w-24 h-24 bg-purple-600/10 rounded-[32px] mx-auto mb-8 flex items-center justify-center border-2 border-dashed border-purple-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4" /></svg>
        </div>
        <h2 class="text-3xl font-black mb-3">مستخرج الجفات السحابي</h2>
        <p class="text-neutral-500 mb-10 text-sm leading-relaxed">متوافق تماماً مع الاستضافات الخارجية والروابط المباشرة.</p>
        
        <label class="block w-full bg-white text-black font-black py-5 rounded-[24px] cursor-pointer mb-4 hover:bg-neutral-200 transition">
            اختر فيديو من الجهاز
            <input type="file" id="video-input" accept="video/*" class="hidden">
        </label>
        
        <div class="flex items-center gap-4 py-6 text-neutral-800 font-bold text-[10px] uppercase tracking-[0.2em]">
            <hr class="flex-1 border-neutral-900">أو رابط فيديو مباشر<hr class="flex-1 border-neutral-900">
        </div>

        <div class="space-y-4">
            <div class="flex gap-2">
                <input type="text" id="video-url" placeholder="https://..." class="flex-1 bg-neutral-900 border border-neutral-800 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-purple-600 transition text-white">
                <button id="url-btn" class="bg-neutral-800 hover:bg-neutral-700 px-6 rounded-2xl font-bold transition text-white">فتح</button>
            </div>
            
            <div id="initial-load-container" class="hidden w-full space-y-2">
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-neutral-600">
                    <span id="load-status-text">جاري الاتصال...</span>
                    <span id="load-percentage">0%</span>
                </div>
                <div class="w-full h-1.5 bg-neutral-900 rounded-full overflow-hidden">
                    <div id="initial-load-bar" class="h-full btn-gradient transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="feed-screen" class="hidden px-4 max-w-xl mx-auto mt-6 space-y-8">
        <div id="gif-grid" class="space-y-8"></div>
        <div id="load-more-trigger" class="py-20 flex justify-center">
            <div class="loader-spin"></div>
        </div>
    </div>

    <!-- Focus Overlay & Quality Modal (Same as before) -->
    <div id="focus-overlay" class="fixed inset-0 bg-black/95 backdrop-blur-2xl z-[1000] hidden flex flex-col items-center justify-center p-6">
        <button id="close-focus" class="absolute top-8 right-8 p-3 bg-white/10 rounded-full text-white hover:bg-white/20 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        <div class="w-full max-w-3xl bg-[#050505] rounded-[40px] overflow-hidden border border-white/5 shadow-2xl">
            <canvas id="focus-canvas" class="w-full aspect-video block object-contain bg-black"></canvas>
            <div class="p-8 text-right">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-2xl font-black mb-1">معاينة اللقطة</h3>
                        <p id="focus-meta" class="text-purple-400 font-bold text-xs uppercase">SHOT TIMESTAMP: --</p>
                    </div>
                </div>
                <button id="download-focus-btn" class="w-full btn-gradient py-5 rounded-[20px] font-black text-white flex items-center justify-center gap-3">
                    تصدير وتحميل GIF
                </button>
            </div>
        </div>
    </div>

    <div id="quality-modal" class="fixed inset-0 z-[2000] bg-black/80 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm p-8 text-center bg-[#0a0a0a] rounded-[40px] border border-white/5">
            <h4 class="text-2xl font-black mb-1">دقة التصدير</h4>
            <div class="space-y-3 my-8">
                <button onclick="confirmDownload('low')" class="w-full py-4 bg-neutral-900 rounded-2xl font-bold flex justify-between px-6 items-center">
                    <span>منخفضة</span><span class="text-neutral-600">360p</span>
                </button>
                <button onclick="confirmDownload('excellent')" class="w-full py-5 bg-purple-600/10 border border-purple-500/30 rounded-2xl font-black flex justify-between px-6 items-center text-purple-400">
                    <span>جودة كريستال</span><span class="bg-purple-600 text-white px-2 rounded text-[8px]">1080P</span>
                </button>
            </div>
            <button onclick="closeQualityModal()" class="text-neutral-600 text-sm font-bold">إلغاء</button>
        </div>
    </div>

    <div id="global-processing" class="fixed inset-0 z-[3000] bg-black/95 flex flex-col items-center justify-center hidden p-10 text-center">
        <div class="loader-spin w-20 h-20 mb-8 border-t-purple-500"></div>
        <p id="global-status" class="text-2xl font-black text-white mb-2">جاري الرندر الرقمي...</p>
        <div class="w-64 h-1.5 bg-neutral-900 rounded-full mt-6 overflow-hidden">
            <div id="global-progress" class="h-full btn-gradient" style="width: 0%"></div>
        </div>
    </div>

    <video id="source-video" crossorigin="anonymous" playsinline style="display:none"></video>

    <script>
        const videoUrl = document.getElementById('video-url');
        const urlBtn = document.getElementById('url-btn');
        const initialLoadContainer = document.getElementById('initial-load-container');
        const initialLoadBar = document.getElementById('initial-load-bar');
        const loadStatusText = document.getElementById('load-status-text');
        const sourceVideo = document.getElementById('source-video');
        const uploadScreen = document.getElementById('upload-screen');
        const feedScreen = document.getElementById('feed-screen');
        const gifGrid = document.getElementById('gif-grid');
        
        let workerBlobUrl = null;
        let isGlobalPaused = false;
        let currentVideoUrl = "";
        let activePreviews = [];

        // تحسين تحميل الـ Worker ليعمل على GitHub Pages
        async function initWorker() {
            try {
                const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
                const blob = await response.blob();
                workerBlobUrl = URL.createObjectURL(blob);
            } catch (e) { console.error("Worker Error", e); }
        }
        initWorker();

        function updateLoadProgress(p, status) {
            initialLoadBar.style.width = `${p}%`;
            document.getElementById('load-percentage').innerText = `${p}%`;
            loadStatusText.innerText = status;
        }

        urlBtn.onclick = async () => {
            const url = videoUrl.value.trim();
            if (!url) return;
            
            initialLoadContainer.classList.remove('hidden');
            updateLoadProgress(30, "جاري فحص الرابط...");
            
            // محرك الاستخراج الذكي (نسخة الـ Cloud)
            try {
                const testVideo = document.createElement('video');
                testVideo.crossOrigin = "anonymous";
                testVideo.src = url;
                
                // محاولة التحميل المباشر أولاً
                testVideo.onloadedmetadata = () => startApp(url);
                
                testVideo.onerror = () => {
                    updateLoadProgress(60, "تجاوز قيود السيرفر...");
                    // استخدام AllOrigins للالتفاف على CORS
                    const proxied = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    startApp(proxied);
                };
            } catch (e) {
                alert("تعذر الوصول للرابط");
            }
        };

        document.getElementById('video-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) startApp(URL.createObjectURL(file));
        };

        function startApp(src) {
            currentVideoUrl = src;
            sourceVideo.src = src;
            sourceVideo.crossOrigin = "anonymous";
            sourceVideo.load();

            sourceVideo.onloadedmetadata = () => {
                updateLoadProgress(100, "جاهز!");
                setTimeout(() => {
                    uploadScreen.classList.add('hidden');
                    feedScreen.classList.remove('hidden');
                    generateBatch(3);
                }, 500);
            };
        }

        async function createGifCard() {
            const duration = sourceVideo.duration;
            if (!duration) return;
            
            const start = Math.random() * (duration - 4);
            const end = start + 3;
            const id = `c-${Date.now()}-${Math.random()}`;

            const card = document.createElement('div');
            card.className = 'gif-card group relative aspect-video bg-[#050505] shimmer';
            card.innerHTML = `<canvas id="${id}" class="w-full h-full block object-contain opacity-0 transition-opacity"></canvas>`;
            card.onclick = () => openFocusMode(start, end);
            gifGrid.appendChild(card);

            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d', {alpha: false});
            const v = document.createElement('video');
            v.src = currentVideoUrl;
            v.crossOrigin = "anonymous";
            v.muted = true;
            v.currentTime = start;
            
            v.onloadeddata = () => {
                canvas.width = 480;
                canvas.height = 480 / (v.videoWidth / v.videoHeight);
                canvas.classList.remove('opacity-0');
                card.classList.remove('shimmer');

                const loop = () => {
                    if (isGlobalPaused) return;
                    if (v.currentTime >= end || v.currentTime < start) v.currentTime = start;
                    ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                    v.play().catch(()=>{});
                    requestAnimationFrame(loop);
                };
                activePreviews.push({v, loop});
                loop();
            };
        }

        function generateBatch(n) { for(let i=0; i<n; i++) createGifCard(); }

        // باقي وظائف الـ Focus والتصدير (متطابقة ومصلحة)
        window.openFocusMode = (s, e) => {
            isGlobalPaused = true;
            document.getElementById('focus-overlay').classList.remove('hidden');
            const fv = document.createElement('video');
            fv.src = currentVideoUrl;
            fv.crossOrigin = "anonymous";
            fv.muted = true;
            fv.currentTime = s;
            const fc = document.getElementById('focus-canvas');
            const fctx = fc.getContext('2d');
            
            fv.onloadeddata = () => {
                fc.width = 1280;
                fc.height = 1280 / (fv.videoWidth / fv.videoHeight);
                const floop = () => {
                    if (!isGlobalPaused) return;
                    if (fv.currentTime >= e || fv.currentTime < s) fv.currentTime = s;
                    fctx.drawImage(fv, 0, 0, fc.width, fc.height);
                    fv.play().catch(()=>{});
                    requestAnimationFrame(floop);
                };
                floop();
            };
            window._currentFocusV = fv;
            document.getElementById('download-focus-btn').onclick = () => {
                window._pending = {s, e};
                document.getElementById('quality-modal').classList.remove('hidden');
            };
        };

        document.getElementById('close-focus').onclick = () => {
            isGlobalPaused = false;
            if(window._currentFocusV) window._currentFocusV.pause();
            document.getElementById('focus-overlay').classList.add('hidden');
            activePreviews.forEach(p => p.loop());
        };

        window.confirmDownload = async (qKey) => {
            document.getElementById('quality-modal').classList.add('hidden');
            document.getElementById('global-processing').classList.remove('hidden');
            
            const {s, e} = window._pending;
            const w = qKey === 'low' ? 360 : 720;
            const gif = new GIF({
                workers: 2, quality: 10, width: w,
                height: w / (sourceVideo.videoWidth/sourceVideo.videoHeight),
                workerScript: workerBlobUrl
            });

            const tempC = document.createElement('canvas');
            tempC.width = w; tempC.height = w / (sourceVideo.videoWidth/sourceVideo.videoHeight);
            const tctx = tempC.getContext('2d');

            let cur = s;
            while(cur <= e) {
                sourceVideo.currentTime = cur;
                await new Promise(r => sourceVideo.onseeked = r);
                tctx.drawImage(sourceVideo, 0, 0, w, tempC.height);
                gif.addFrame(tctx, {copy: true, delay: 100});
                cur += 0.1;
                document.getElementById('global-progress').style.width = `${((cur-s)/(e-s))*100}%`;
            }

            gif.on('finished', blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `infinity-${Date.now()}.gif`;
                a.click();
                document.getElementById('global-processing').classList.add('hidden');
            });
            gif.render();
        };

        const observer = new IntersectionObserver(ent => { if(ent[0].isIntersecting) generateBatch(1); });
        observer.observe(document.getElementById('load-more-trigger'));
    </script>
</body>
</html>
