<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Gifs Pro - Luxury Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            color: #fff;
            user-select: none;
            overflow-x: hidden;
        }

        .gif-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 32px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .gif-card:hover {
            border-color: #7c3aed;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -20px rgba(124, 58, 237, 0.4);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        }

        .shimmer {
            background: linear-gradient(90deg, #0a0a0a 25%, #151515 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .loader-spin {
            border: 3px solid rgba(124, 58, 237, 0.1);
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-black/70 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M10 8v8l6-4-6-4z"/></svg>
            </div>
            <span class="text-xl font-black tracking-tight uppercase">INFINITY <span class="text-purple-500">PRO</span></span>
        </div>
        <button onclick="location.reload()" class="p-2 text-neutral-500 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        </button>
    </header>

    <!-- Upload Screen -->
    <div id="upload-screen" class="max-w-md mx-auto mt-20 px-8 text-center">
        <div class="w-24 h-24 bg-purple-600/10 rounded-[32px] mx-auto mb-8 flex items-center justify-center border-2 border-dashed border-purple-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4" /></svg>
        </div>
        <h2 class="text-3xl font-black mb-3">مستخرج الجفات الذكي</h2>
        <p class="text-neutral-500 mb-10 text-sm leading-relaxed">أدخل الرابط وسنقوم بفك حظر السيرفر تلقائياً وتوليد اللقطات.</p>
        
        <label class="block w-full bg-white text-black font-black py-5 rounded-[24px] cursor-pointer mb-4 hover:bg-neutral-200 transition active:scale-95">
            اختر فيديو من الجهاز
            <input type="file" id="video-input" accept="video/*" class="hidden">
        </label>
        
        <div class="flex items-center gap-4 py-6 text-neutral-800 font-bold text-[10px] uppercase tracking-[0.2em]">
            <hr class="flex-1 border-neutral-900">أو رابط فيديو مباشر<hr class="flex-1 border-neutral-900">
        </div>

        <div class="space-y-4">
            <div class="flex gap-2">
                <input type="text" id="video-url" placeholder="https://..." class="flex-1 bg-neutral-900 border border-neutral-800 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-purple-600 transition text-white">
                <button id="url-btn" class="bg-neutral-800 hover:bg-neutral-700 px-6 rounded-2xl font-bold transition text-white">فتح</button>
            </div>
            
            <!-- Progress bar for loading links -->
            <div id="initial-load-container" class="hidden w-full space-y-2">
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-neutral-600">
                    <span id="load-status-text">جاري الفحص...</span>
                    <span id="load-percentage">0%</span>
                </div>
                <div class="w-full h-1.5 bg-neutral-900 rounded-full overflow-hidden">
                    <div id="initial-load-bar" class="h-full btn-gradient transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feed Section -->
    <div id="feed-screen" class="hidden px-4 max-w-xl mx-auto mt-6 space-y-8">
        <div id="gif-grid" class="space-y-8"></div>
        <div id="load-more-trigger" class="py-20 flex justify-center">
            <div class="loader-spin"></div>
        </div>
    </div>

    <!-- Focus Preview Overlay -->
    <div id="focus-overlay" class="fixed inset-0 bg-black/95 backdrop-blur-2xl z-[1000] hidden flex flex-col items-center justify-center p-6">
        <button id="close-focus" class="absolute top-8 right-8 p-3 bg-white/10 rounded-full text-white hover:bg-white/20 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        <div class="w-full max-w-3xl bg-[#050505] rounded-[40px] overflow-hidden border border-white/5 shadow-2xl">
            <canvas id="focus-canvas" class="w-full aspect-video block object-contain bg-black"></canvas>
            <div class="p-8 text-right">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-2xl font-black mb-1">معاينة اللقطة</h3>
                        <p id="focus-meta" class="text-purple-400 font-bold text-xs uppercase">SHOT TIMESTAMP: --</p>
                    </div>
                </div>
                <button id="download-focus-btn" class="w-full btn-gradient py-5 rounded-[20px] font-black text-white flex items-center justify-center gap-3 hover:opacity-90 transition">
                    تصدير وتحميل GIF
                </button>
            </div>
        </div>
    </div>

    <!-- Quality Selection Modal -->
    <div id="quality-modal" class="fixed inset-0 z-[2000] bg-black/80 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm p-8 text-center bg-[#0a0a0a] rounded-[40px] border border-white/5">
            <h4 class="text-2xl font-black mb-1">دقة التصدير</h4>
            <p class="text-neutral-500 text-xs mb-8">اختر الجودة المطلوبة</p>
            <div class="space-y-3 mb-8">
                <button onclick="confirmDownload('low')" class="w-full py-4 bg-neutral-900 hover:bg-neutral-800 rounded-2xl font-bold flex justify-between px-6 items-center transition">
                    <span>منخفضة</span><span class="text-neutral-600 text-[10px]">360p</span>
                </button>
                <button onclick="confirmDownload('medium')" class="w-full py-4 bg-neutral-900 hover:bg-neutral-800 rounded-2xl font-bold flex justify-between px-6 items-center transition">
                    <span>متوازنة</span><span class="text-neutral-600 text-[10px]">480p</span>
                </button>
                <button onclick="confirmDownload('excellent')" class="w-full py-5 bg-purple-600/10 border border-purple-500/30 hover:bg-purple-600/20 rounded-2xl font-black flex justify-between px-6 items-center transition">
                    <span class="text-purple-400">جودة كريستال</span><span class="bg-purple-600 text-white px-2 py-0.5 rounded text-[8px]">1080P</span>
                </button>
            </div>
            <button onclick="closeQualityModal()" class="text-neutral-600 text-sm font-bold hover:text-white transition">إلغاء</button>
        </div>
    </div>

    <!-- Global Processing Overlay -->
    <div id="global-processing" class="fixed inset-0 z-[3000] bg-black/95 flex flex-col items-center justify-center hidden p-10 text-center">
        <div class="loader-spin w-20 h-20 mb-8 border-t-purple-500"></div>
        <p id="global-status" class="text-2xl font-black text-white mb-2">جاري الرندر الرقمي...</p>
        <div class="w-64 h-1.5 bg-neutral-900 rounded-full overflow-hidden mt-6">
            <div id="global-progress" class="h-full btn-gradient transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <video id="source-video" crossorigin="anonymous" playsinline style="display:none"></video>

    <script>
        const videoInput = document.getElementById('video-input');
        const videoUrl = document.getElementById('video-url');
        const urlBtn = document.getElementById('url-btn');
        const initialLoadContainer = document.getElementById('initial-load-container');
        const initialLoadBar = document.getElementById('initial-load-bar');
        const loadPercentageText = document.getElementById('load-percentage');
        const loadStatusText = document.getElementById('load-status-text');

        const sourceVideo = document.getElementById('source-video');
        const uploadScreen = document.getElementById('upload-screen');
        const feedScreen = document.getElementById('feed-screen');
        const gifGrid = document.getElementById('gif-grid');
        const trigger = document.getElementById('load-more-trigger');
        
        const focusOverlay = document.getElementById('focus-overlay');
        const focusCanvas = document.getElementById('focus-canvas');
        const globalProcessing = document.getElementById('global-processing');
        const globalProgress = document.getElementById('global-progress');
        const globalStatus = document.getElementById('global-status');

        let totalClips = 0;
        let workerBlobUrl = null;
        let isGlobalPaused = false;
        let activePreviews = [];
        let pendingRange = { start: 0, end: 0 };

        async function prepareWorker() {
            try {
                const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
                const blob = await response.blob();
                workerBlobUrl = URL.createObjectURL(blob);
            } catch (err) { console.error("Worker failed", err); }
        }
        prepareWorker();

        function getProxiedUrl(url) {
            if (url.startsWith('blob:')) return url;
            return `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        }

        urlBtn.onclick = () => {
            const rawUrl = videoUrl.value.trim();
            if (rawUrl) {
                initialLoadContainer.classList.remove('hidden');
                updateLoadProgress(30, "جاري الاتصال بالسيرفر...");
                startApp(rawUrl, true);
            }
        };

        videoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                startApp(url, false);
            }
        };

        function updateLoadProgress(p, status) {
            initialLoadBar.style.width = `${p}%`;
            loadPercentageText.innerText = `${p}%`;
            loadStatusText.innerText = status;
        }

        function startApp(src, isRemote) {
            sourceVideo.src = src;
            sourceVideo.onloadedmetadata = () => {
                updateLoadProgress(100, "تم بنجاح!");
                setTimeout(() => {
                    uploadScreen.classList.add('hidden');
                    feedScreen.classList.remove('hidden');
                    generateBatch(3);
                }, 500);
            };

            sourceVideo.onerror = () => {
                if (isRemote && !src.includes('allorigins')) {
                    updateLoadProgress(60, "تجاوز حماية السيرفر...");
                    startApp(getProxiedUrl(videoUrl.value.trim()), true);
                } else {
                    alert("خطأ: تعذر تحميل الفيديو. السيرفر محمي بالكامل. يرجى رفعه يدوياً.");
                    initialLoadContainer.classList.add('hidden');
                }
            };
        }

        async function createGifCard() {
            totalClips++;
            const id = `card-${totalClips}`;
            const duration = sourceVideo.duration;
            const startTime = Math.random() * (duration - 4);
            const endTime = startTime + 3;

            const card = document.createElement('div');
            card.className = 'gif-card group';
            card.innerHTML = `
                <div class="relative w-full aspect-video bg-[#050505] shimmer overflow-hidden" onclick="openFocusMode(${startTime}, ${endTime})">
                    <canvas id="canvas-${id}" class="w-full h-full block object-contain opacity-0 transition-opacity duration-500"></canvas>
                    <div class="absolute bottom-5 left-5 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="event.stopPropagation(); requestDownloadQuick(${startTime}, ${endTime})" class="p-4 bg-purple-600 rounded-[20px] text-white shadow-2xl hover:scale-105 transition active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        </button>
                    </div>
                </div>
            `;
            gifGrid.appendChild(card);

            const canvas = document.getElementById(`canvas-${id}`);
            const ctx = canvas.getContext('2d', { alpha: false });
            
            const localVideo = document.createElement('video');
            localVideo.src = sourceVideo.src;
            localVideo.crossOrigin = "anonymous";
            localVideo.muted = true;
            localVideo.currentTime = startTime;

            localVideo.onloadeddata = () => {
                canvas.width = 480;
                canvas.height = 480 / (localVideo.videoWidth / localVideo.videoHeight);
                canvas.classList.remove('opacity-0');
                canvas.parentElement.classList.remove('shimmer');

                const playLoop = () => {
                    if (isGlobalPaused) { localVideo.pause(); return; }
                    if (localVideo.currentTime >= endTime || localVideo.currentTime < startTime) localVideo.currentTime = startTime;
                    ctx.drawImage(localVideo, 0, 0, canvas.width, canvas.height);
                    localVideo.play().catch(()=>{});
                    requestAnimationFrame(playLoop);
                };
                activePreviews.push({ v: localVideo, loop: playLoop });
                playLoop();
            };
        }

        function generateBatch(count) {
            for (let i = 0; i < count; i++) createGifCard();
        }

        let focusV = null;
        window.openFocusMode = (start, end) => {
            isGlobalPaused = true;
            focusOverlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            focusV = document.createElement('video');
            focusV.src = sourceVideo.src;
            focusV.crossOrigin = "anonymous";
            focusV.muted = true;
            focusV.currentTime = start;
            const fCtx = focusCanvas.getContext('2d');
            focusV.onloadeddata = () => {
                focusCanvas.width = 1280;
                focusCanvas.height = 1280 / (focusV.videoWidth / focusV.videoHeight);
                focusV.play().catch(() => {});
                const fLoop = () => {
                    if (!focusV) return;
                    if (focusV.currentTime >= end || focusV.currentTime < start) focusV.currentTime = start;
                    fCtx.drawImage(focusV, 0, 0, focusCanvas.width, focusCanvas.height);
                    requestAnimationFrame(fLoop);
                };
                fLoop();
            };
            document.getElementById('focus-meta').innerText = `SHOT TIMESTAMP: ${start.toFixed(2)}s`;
            document.getElementById('download-focus-btn').onclick = () => requestDownloadQuick(start, end);
        };

        document.getElementById('close-focus').onclick = () => {
            if (focusV) { focusV.pause(); focusV = null; }
            focusOverlay.classList.add('hidden');
            document.body.style.overflow = '';
            isGlobalPaused = false;
            activePreviews.forEach(p => p.loop());
        };

        window.requestDownloadQuick = (s, e) => {
            pendingRange = { start: s, end: e };
            document.getElementById('quality-modal').classList.remove('hidden');
        };

        window.closeQualityModal = () => document.getElementById('quality-modal').classList.add('hidden');

        window.confirmDownload = async (qKey) => {
            closeQualityModal();
            globalProcessing.classList.remove('hidden');
            
            let w, q, step = 0.1;
            if (qKey === 'low') { w = 320; q = 25; step = 0.15; }
            else if (qKey === 'excellent') { w = 1080; q = 4; step = 0.08; }
            else { w = 480; q = 10; step = 0.1; }

            const gif = new GIF({
                workers: 4,
                quality: q,
                width: w,
                height: w / (sourceVideo.videoWidth / sourceVideo.videoHeight),
                workerScript: workerBlobUrl
            });

            const tCanvas = document.createElement('canvas');
            tCanvas.width = w; 
            tCanvas.height = w / (sourceVideo.videoWidth / sourceVideo.videoHeight);
            const tCtx = tCanvas.getContext('2d');

            let cur = pendingRange.start;
            while (cur <= pendingRange.end) {
                sourceVideo.currentTime = cur;
                await new Promise(r => sourceVideo.onseeked = r);
                tCtx.drawImage(sourceVideo, 0, 0, w, tCanvas.height);
                gif.addFrame(tCtx, {copy: true, delay: 100});
                cur += step;
                const p = Math.round(((cur - pendingRange.start) / (pendingRange.end - pendingRange.start)) * 100);
                globalProgress.style.width = `${Math.min(99, p)}%`;
                globalStatus.innerText = `جاري استخراج الإطارات... ${Math.min(99, p)}%`;
            }

            gif.on('finished', b => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(b);
                a.download = `infinity-${qKey}-${Date.now()}.gif`;
                a.click();
                globalProcessing.classList.add('hidden');
            });
            
            globalStatus.innerText = "جاري تجميع ملف GIF...";
            gif.render();
        };

        const observer = new IntersectionObserver(e => { if(e[0].isIntersecting) generateBatch(1); }, {threshold: 0.1});
        observer.observe(trigger);
    </script>
</body>
</html>
